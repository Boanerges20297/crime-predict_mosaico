services:
  crime-predict:
    build: .
    container_name: crime-predict
    restart: unless-stopped
    expose:
      - "5000"
    environment:
      PYTHONUNBUFFERED: "1"

  caddy:
    image: caddy:2-alpine
    container_name: crime-predict-caddy
    restart: unless-stopped
    depends_on:
      - crime-predict
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
